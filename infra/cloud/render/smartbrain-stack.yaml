services:
  - type: web
    name: smartbrain-service
    env: docker
    dockerfilePath: ./services/smartbrain-python/Dockerfile
    autoDeploy: true
    healthCheckPath: /health
    plan: starter
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_PORT
        value: "8000"
      - key: SMARTBRAIN_API_KEY
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: HYPERLIQUID_PRIVATE_KEY
        sync: false
      - key: HYPERLIQUID_ACCOUNT_ADDRESS
        sync: false
      - key: HYPERLIQUID_USE_TESTNET
        value: "false"
      - key: OPENAI_API_KEY
        sync: false
      - key: GROK_API_KEY
        sync: false
      - key: CRYPTOPANIC_API_KEY
        sync: false
      - key: NEWS_API_KEY
        sync: false
      - key: LUNARCRUSH_API_KEY
        sync: false
      - key: COINGECKO_API_KEY
        sync: false
      - key: MODEL_STORE_DIR
        value: /var/data/model_store
      - key: INTERNAL_SCHEDULER_ENABLED
        value: "true"
      - key: SCHEDULER_INGESTION_INTERVAL_MINUTES
        value: "5"
      - key: SCHEDULER_DECISION_INTERVAL_MINUTES
        value: "1"
      - key: SCHEDULER_RL_REPLAY_INTERVAL_MINUTES
        value: "30"
      - key: SCHEDULER_TREE_INTERVAL_HOURS
        value: "1"
      - key: SCHEDULER_DAILY_RETRAIN_HOUR_UTC
        value: "0"
      - key: SCHEDULER_DAILY_RETRAIN_MINUTE_UTC
        value: "0"
    disk:
      name: smartbrain-model-store
      mountPath: /var/data
      sizeGB: 10
